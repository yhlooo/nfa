syntax = "proto3";

package trpc.yuanbao.yuanbao_conn.yuanbao_openclaw_proxy;

import "pkg/channels/yuanbaobot/proto/conn.proto";

option go_package = "github.com/yhlooo/nfa/pkg/channels/yuanbaobot/proto";

message ImMsgSeq {
  uint64 msgSeq = 1;
  string msgId  = 2;
}

message ImImageInfoArray {
  uint32 type   = 1;
  uint32 size   = 2;
  uint32 width  = 3;
  uint32 height = 4;
  string url    = 5;
}

message MsgContent {
  string                      text           = 1;
  string                      uuid           = 2;
  uint32                      imageFormat    = 3;
  string                      data           = 4;
  string                      desc           = 5;
  string                      ext            = 6;
  string                      sound          = 7;
  repeated ImImageInfoArray   imageInfoArray = 8;
  uint32                      index          = 9;
  string                      url            = 10;
  uint32                      fileSize       = 11;
  string                      fileName       = 12;
}

message MsgBodyElement {
  string      msgType    = 1;
  MsgContent  msgContent = 2;
}

message LogInfoExt {
  string traceId = 1;
}

message SendC2CMessageReq {
  string                msgId       = 1;
  string                toAccount   = 2;
  string                fromAccount = 3;
  uint32                msgRandom   = 4;
  repeated MsgBodyElement msgBody   = 5;
  string                groupCode   = 6;
  uint64                msgSeq      = 7;
  LogInfoExt            logExt      = 8;
}

message SendC2CMessageRsp {
  int32  code    = 1;
  string message = 2;
}

message SendGroupMessageReq {
  string                msgId       = 1;
  string                groupCode   = 2;
  string                fromAccount = 3;
  string                toAccount   = 4;
  string                random      = 5;
  repeated MsgBodyElement msgBody   = 6;
  string                refMsgId    = 7;
  uint64                msgSeq      = 8;
  LogInfoExt            logExt      = 9;
}

message SendGroupMessageRsp {
  int32  code    = 1;
  string message = 2;
}

enum EnumCLawMsgType {
  CLAW_MSG_UNKNOWN = 0;
  CLAW_MSG_GROUP   = 1;
  CLAW_MSG_PRIVATE = 2;
}

message InboundMessagePush {
  string                   callbackCommand     = 1;
  string                   fromAccount         = 2;
  string                   toAccount           = 3;
  string                   senderNickname      = 4;
  string                   groupId             = 5;
  string                   groupCode           = 6;
  string                   groupName           = 7;
  uint32                   msgSeq              = 8;
  uint32                   msgRandom           = 9;
  uint32                   msgTime             = 10;
  string                   msgKey              = 11;
  string                   msgId               = 12;
  repeated MsgBodyElement  msgBody             = 13;
  string                   cloudCustomData     = 14;
  uint32                   eventTime           = 15;
  string                   botOwnerId          = 16;
  repeated ImMsgSeq        recallMsgSeqList    = 17;
  EnumCLawMsgType          clawMsgType         = 18;
  string                   privateFromGroupCode = 19;
  LogInfoExt               logExt              = 20;
}

message GetGroupMemberListReq {
  string groupCode = 1;
}

message Member {
  string userId   = 1;
  string nickName = 2;
  int32  userType = 3;
}

message GetGroupMemberListRsp {
  int32           code       = 1;
  string          message    = 2;
  repeated Member memberList = 3;
}

message QueryGroupInfoReq {
  string groupCode = 1;
}

message GroupInfo {
  string groupName         = 1;
  string groupOwnerUserId  = 2;
  string groupOwnerNickname = 3;
  int32  groupSize         = 4;
}

message QueryGroupInfoRsp {
  int32     code      = 1;
  string    msg       = 2;
  GroupInfo groupInfo = 3;
}

enum EnumHeartbeat {
  HEARTBEAT_UNKNOWN = 0;
  HEARTBEAT_RUNNING = 1;
  HEARTBEAT_FINISH  = 2;
}

message SendPrivateHeartbeatReq {
  string         fromAccount = 1;
  string         toAccount   = 2;
  EnumHeartbeat  heartbeat   = 3;
}

message SendPrivateHeartbeatRsp {
  int32  code = 1;
  string msg  = 2;
}

message SendGroupHeartbeatReq {
  string         fromAccount = 1;
  string         toAccount   = 2;
  string         groupCode   = 3;
  int64          sendTime    = 4;
  EnumHeartbeat  heartbeat   = 5;
}

message SendGroupHeartbeatRsp {
  int32  code = 1;
  string msg  = 2;
}

message Command {
  string name        = 1;
  string description = 2;
}

message SyncCommandsData {
  repeated Command botCommands    = 1;
  repeated Command pluginCommands = 2;
}

enum SyncInformationType {
  SYNC_INFORMATION_TYPE_UNSPECIFIED = 0;
  SYNC_INFORMATION_TYPE_COMMANDS    = 1;
}

message SyncInformationReq {
  SyncInformationType syncType       = 1;
  string              botVersion     = 2;
  string              pluginVersion  = 3;
  SyncCommandsData    commandData    = 11;
}

message SyncInformationRsp {
  int32  code = 1;
  string msg  = 2;
}
